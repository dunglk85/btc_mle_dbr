name: Manual Data Fetch

on:
  workflow_dispatch:
    inputs:
      target:
        description: Databricks bundle target to run
        required: true
        default: simplying
        type: choice
        options:
          - simplying
          - dev
          - prod

jobs:
  fetch-and-run-data-pipeline:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: databricks/setup-cli@main

      - name: Check required secrets
        run: |
          test -n "$DATABRICKS_HOST" || (echo "Missing DATABRICKS_HOST secret" && exit 1)
          test -n "$DATABRICKS_TOKEN" || (echo "Missing DATABRICKS_TOKEN secret" && exit 1)

      - name: Run Databricks inference job
        run: databricks bundle run btc_inference_job --target "${{ inputs.target }}"
