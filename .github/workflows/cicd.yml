name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [main, simplying]
  push:
    branches: [main, simplying]

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install ruff pytest
      - run: ruff check src/ tests/
      - run: pytest tests/ --cov=src --cov-report=term
        env:
          PYTHONPATH: ${{ github.workspace }}

  validate-bundle:
    name: Validate Databricks bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Resolve Databricks target
        run: |
          BRANCH="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          if [ "$BRANCH" = "main" ]; then
            echo "DATABRICKS_TARGET=prod" >> "$GITHUB_ENV"
            echo "DATABRICKS_CATALOG=btc_prod" >> "$GITHUB_ENV"
          else
            echo "DATABRICKS_TARGET=dev" >> "$GITHUB_ENV"
            echo "DATABRICKS_CATALOG=btc_simply" >> "$GITHUB_ENV"
          fi
      - run: databricks bundle validate --target "$DATABRICKS_TARGET"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  deploy:
    name: Deploy to Databricks
    needs: [lint-and-test, validate-bundle]
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/simplying') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Resolve Databricks target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "DATABRICKS_TARGET=prod" >> "$GITHUB_ENV"
            echo "DATABRICKS_CATALOG=btc_prod" >> "$GITHUB_ENV"
          else
            echo "DATABRICKS_TARGET=dev" >> "$GITHUB_ENV"
            echo "DATABRICKS_CATALOG=btc_simply" >> "$GITHUB_ENV"
          fi
      - name: Ensure Unity Catalog catalog exists
        run: |
          databricks catalogs get "$DATABRICKS_CATALOG" >/dev/null 2>&1 || \
            databricks catalogs create "$DATABRICKS_CATALOG" \
              --comment "Created by CI/CD for ${GITHUB_REF_NAME}"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      - run: databricks bundle deploy --target "$DATABRICKS_TARGET"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
