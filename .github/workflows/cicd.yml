name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [main, simplying]
  push:
    branches: [main, simplying]

jobs:
  validate-notebooks:
    name: Validate notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Compile notebooks
        run: python -m py_compile notebooks/01_data_ingestion.py notebooks/02_feature_engineering.py notebooks/03_optuna_training.py notebooks/04_champion_challenger.py notebooks/05_prediction.py notebooks/06_monitoring.py notebooks/test_drift_thresholds.py

  validate-bundle:
    name: Validate Databricks bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Resolve Databricks target
        run: |
          BRANCH="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          if [ "$BRANCH" = "main" ]; then
            echo "DATABRICKS_TARGET=prod" >> "$GITHUB_ENV"
            echo "DATABRICKS_CATALOG=btc_prod" >> "$GITHUB_ENV"
          else
            echo "DATABRICKS_TARGET=simplying" >> "$GITHUB_ENV"
            echo "DATABRICKS_CATALOG=btc_simply" >> "$GITHUB_ENV"
          fi
      - run: databricks bundle validate --target "$DATABRICKS_TARGET"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  deploy:
    name: Deploy to Databricks
    needs: [validate-notebooks, validate-bundle]
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/simplying') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Resolve Databricks target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "DATABRICKS_TARGET=prod" >> "$GITHUB_ENV"
            echo "DATABRICKS_CATALOG=btc_prod" >> "$GITHUB_ENV"
          else
            echo "DATABRICKS_TARGET=simplying" >> "$GITHUB_ENV"
            echo "DATABRICKS_CATALOG=btc_simply" >> "$GITHUB_ENV"
          fi
      - name: Ensure Unity Catalog catalog exists
        run: |
          if databricks catalogs get "$DATABRICKS_CATALOG" >/dev/null 2>&1; then
            echo "Catalog $DATABRICKS_CATALOG already exists"
            exit 0
          fi

          echo "::error::Catalog $DATABRICKS_CATALOG does not exist. Create it once in the Databricks UI using Default Storage, then rerun CI/CD."
          exit 1
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      - name: Ensure Unity Catalog schemas exist
        run: |
          for schema in raw features predictions monitoring models; do
            if databricks schemas get "$DATABRICKS_CATALOG.$schema" >/dev/null 2>&1; then
              echo "Schema $DATABRICKS_CATALOG.$schema already exists"
            else
              databricks schemas create "$schema" "$DATABRICKS_CATALOG" \
                --comment "Created by CI/CD for ${GITHUB_REF_NAME}"
            fi
          done
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      - run: databricks bundle deploy --target "$DATABRICKS_TARGET"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
