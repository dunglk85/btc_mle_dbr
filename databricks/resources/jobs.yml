resources:
  jobs:
    btc_data_prediction_job:
      name: "[${bundle.target}] BTC Data Prediction Job"
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      git_source:
        git_url: https://github.com/dunglk85/btc_mle_dbr
        git_provider: gitHub
        git_branch: ${var.git_branch}
      tasks:
        - task_key: data_ingestion
          notebook_task:
            notebook_path: notebooks/01_data_ingestion
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              limit: "24"
        - task_key: feature_engineering
          notebook_task:
            notebook_path: notebooks/02_feature_engineering
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: data_ingestion
        - task_key: model_training_reg_lgbm
          notebook_task:
            notebook_path: notebooks/03_optuna_training
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              n_trials: "15"
              timeout_seconds: "900"
              model_algo: "lightgbm"
          depends_on:
            - task_key: feature_engineering
        - task_key: model_training_reg_xgb
          notebook_task:
            notebook_path: notebooks/03_optuna_training
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              n_trials: "15"
              timeout_seconds: "900"
              model_algo: "xgboost"
          depends_on:
            - task_key: feature_engineering
        - task_key: model_training_reg_rf
          notebook_task:
            notebook_path: notebooks/03_optuna_training
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              n_trials: "15"
              timeout_seconds: "900"
              model_algo: "random_forest"
          depends_on:
            - task_key: feature_engineering
        - task_key: champion_challenger
          notebook_task:
            notebook_path: notebooks/04_champion_challenger
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              lgbm_training_task_key: "model_training_reg_lgbm"
              xgb_training_task_key: "model_training_reg_xgb"
              rf_training_task_key: "model_training_reg_rf"
              max_evaluation_rows: "2000"
              min_evaluation_rows: "100"
          depends_on:
            - task_key: model_training_reg_lgbm
            - task_key: model_training_reg_xgb
            - task_key: model_training_reg_rf
        - task_key: prediction
          notebook_task:
            notebook_path: notebooks/05_prediction
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: champion_challenger
        - task_key: monitoring
          notebook_task:
            notebook_path: notebooks/06_monitoring
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: prediction
        - task_key: drift_monitoring
          notebook_task:
            notebook_path: notebooks/08_drift_monitoring
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              recent_hours: "168"
              reference_hours: "720"
              fail_on_alert: "false"
          depends_on:
            - task_key: monitoring
        - task_key: job_quality_monitoring
          notebook_task:
            notebook_path: notebooks/09_job_quality_monitoring
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              job_name_filter: "BTC"
              lookback_runs: "20"
              max_duration_minutes: "180"
              min_success_rate: "0.8"
              fail_on_alert: "false"
          depends_on:
            - task_key: drift_monitoring
