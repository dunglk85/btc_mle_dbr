resources:
  jobs:
    btc_data_prediction_job:
      name: "[${bundle.target}] BTC Data Prediction Job"
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      git_source:
        git_url: https://github.com/dunglk85/btc_mle_dbr
        git_provider: gitHub
        git_branch: main
      tasks:
        - task_key: fetch_binance
          notebook_task:
            notebook_path: notebooks/00_fetch_binance_to_volume
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              limit: "24"
        - task_key: data_ingestion
          notebook_task:
            notebook_path: notebooks/01_data_ingestion
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: fetch_binance
        - task_key: feature_engineering
          notebook_task:
            notebook_path: notebooks/02_feature_engineering
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: data_ingestion
        - task_key: prediction
          notebook_task:
            notebook_path: notebooks/05_prediction
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: feature_engineering
        - task_key: monitoring
          notebook_task:
            notebook_path: notebooks/06_monitoring
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: prediction
        - task_key: job_quality_monitoring
          notebook_task:
            notebook_path: notebooks/09_job_quality_monitoring
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              job_name_filter: "BTC"
              lookback_runs: "20"
              max_duration_minutes: "60"
              min_success_rate: "0.8"
              fail_on_alert: "false"
          depends_on:
            - task_key: monitoring
    btc_drift_monitoring_job:
      name: "[${bundle.target}] BTC Drift Monitoring Job"
      schedule:
        quartz_cron_expression: "0 0 */6 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      git_source:
        git_url: https://github.com/dunglk85/btc_mle_dbr
        git_provider: gitHub
        git_branch: main
      tasks:
        - task_key: drift_monitoring
          notebook_task:
            notebook_path: notebooks/08_drift_monitoring
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              recent_hours: "168"
              reference_hours: "720"
              fail_on_alert: "false"
        - task_key: training_gate_drift
          notebook_task:
            notebook_path: notebooks/07_training_gate
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              trigger_mode: "drift"
          depends_on:
            - task_key: drift_monitoring
        - task_key: trigger_model_refresh
          notebook_task:
            notebook_path: notebooks/11_trigger_model_refresh
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              model_refresh_job_id: ${resources.jobs.btc_model_refresh_job.id}
              model_refresh_job_name: "[${bundle.target}] BTC Model Refresh Job"
              max_decision_age_hours: "12"
              expected_trigger_mode: "drift"
          depends_on:
            - task_key: training_gate_drift
        - task_key: data_remediation
          notebook_task:
            notebook_path: notebooks/10_data_remediation
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              backfill_limit: "168"
              notebook_timeout_seconds: "1800"
          depends_on:
            - task_key: training_gate_drift
    btc_model_refresh_job:
      name: "[${bundle.target}] BTC Model Refresh Job"
      git_source:
        git_url: https://github.com/dunglk85/btc_mle_dbr
        git_provider: gitHub
        git_branch: main
      tasks:
        - task_key: eda_feature_selection
          notebook_task:
            notebook_path: notebooks/02b_eda_feature_selection
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
        - task_key: model_training_reg_lgbm
          notebook_task:
            notebook_path: notebooks/03_optuna_training
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              n_trials: "15"
              timeout_seconds: "900"
              max_decision_age_hours: "12"
              expected_trigger_mode: "drift"
              model_algo: "lightgbm"
          depends_on:
            - task_key: eda_feature_selection
        - task_key: champion_challenger_reg_lgbm
          notebook_task:
            notebook_path: notebooks/04_champion_challenger
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              training_task_key: "model_training_reg_lgbm"
          depends_on:
            - task_key: model_training_reg_lgbm
        - task_key: model_training_reg_xgb
          notebook_task:
            notebook_path: notebooks/03_optuna_training
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              n_trials: "15"
              timeout_seconds: "900"
              max_decision_age_hours: "12"
              expected_trigger_mode: "drift"
              model_algo: "xgboost"
          depends_on:
            - task_key: eda_feature_selection
        - task_key: champion_challenger_reg_xgb
          notebook_task:
            notebook_path: notebooks/04_champion_challenger
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              training_task_key: "model_training_reg_xgb"
          depends_on:
            - task_key: model_training_reg_xgb
