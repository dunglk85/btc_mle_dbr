resources:
  jobs:
    btc_inference_job:
      name: "[${bundle.target}] BTC Inference Job"
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      git_source:
        git_url: https://github.com/dunglk85/btc_mle_dbr
        git_provider: gitHub
        git_branch: ${var.git_branch}
      tasks:
        - task_key: data_ingestion
          notebook_task:
            notebook_path: notebooks/01_data_ingestion
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 3
          min_retry_interval_millis: 60000
          retry_on_timeout: true
        - task_key: feature_engineering
          notebook_task:
            notebook_path: notebooks/02_feature_engineering
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          max_retries: 3
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          depends_on:
            - task_key: data_ingestion
        - task_key: prediction
          notebook_task:
            notebook_path: notebooks/05_prediction
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              allow_default_feature_fallback: "true"
          max_retries: 3
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          depends_on:
            - task_key: feature_engineering
        - task_key: monitoring
          notebook_task:
            notebook_path: notebooks/06_monitoring
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              recent_hours: "168"
              reference_hours: "720"
              fail_on_alert: "false"
              min_drift_alerts_to_trigger: "2"
          depends_on:
            - task_key: prediction
        - task_key: check_drift_threshold
          condition_task:
            left: "{{tasks.monitoring.values.drift_alert_count}}"
            op: GREATER_THAN_OR_EQUAL
            right: "2"
          depends_on:
            - task_key: monitoring
        - task_key: model_training_reg_lgbm
          notebook_task:
            notebook_path: notebooks/03_optuna_training
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              n_trials: "50"
              timeout_seconds: "1800"
              model_algo: "lightgbm"
              allow_default_feature_fallback: "true"
          max_retries: 3
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          depends_on:
            - task_key: check_drift_threshold
              outcome: "true"
        - task_key: model_training_reg_xgb
          notebook_task:
            notebook_path: notebooks/03_optuna_training
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              n_trials: "50"
              timeout_seconds: "1800"
              model_algo: "xgboost"
              allow_default_feature_fallback: "true"
          max_retries: 3
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          depends_on:
            - task_key: check_drift_threshold
              outcome: "true"
        - task_key: model_training_reg_rf
          notebook_task:
            notebook_path: notebooks/03_optuna_training
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              n_trials: "50"
              timeout_seconds: "1800"
              model_algo: "random_forest"
              allow_default_feature_fallback: "true"
          max_retries: 3
          min_retry_interval_millis: 60000
          retry_on_timeout: true
          depends_on:
            - task_key: check_drift_threshold
              outcome: "true"
        - task_key: champion_challenger
          notebook_task:
            notebook_path: notebooks/04_champion_challenger
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              lgbm_training_task_key: "model_training_reg_lgbm"
              xgb_training_task_key: "model_training_reg_xgb"
              rf_training_task_key: "model_training_reg_rf"
              max_evaluation_rows: "2000"
              min_evaluation_rows: "100"
          depends_on:
            - task_key: model_training_reg_lgbm
            - task_key: model_training_reg_xgb
            - task_key: model_training_reg_rf
