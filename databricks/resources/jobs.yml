resources:
  jobs:
    btc_data_prediction_job:
      name: "[${bundle.target}] BTC Data Prediction Job"
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      git_source:
        git_url: https://github.com/dunglk85/btc_mle_dbr
        git_provider: gitHub
        git_branch: main
      tasks:
        - task_key: fetch_binance
          notebook_task:
            notebook_path: notebooks/00_fetch_binance_to_volume
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              limit: "24"

        - task_key: data_ingestion
          notebook_task:
            notebook_path: notebooks/01_data_ingestion
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: fetch_binance

        - task_key: feature_engineering
          notebook_task:
            notebook_path: notebooks/02_feature_engineering
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: data_ingestion

        - task_key: prediction
          notebook_task:
            notebook_path: notebooks/05_prediction
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: feature_engineering

        - task_key: monitoring
          notebook_task:
            notebook_path: notebooks/06_monitoring
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: prediction

    btc_model_refresh_job:
      name: "[${bundle.target}] BTC Model Refresh Job"
      schedule:
        quartz_cron_expression: "0 0 */12 * * ?"
        timezone_id: UTC
        pause_status: PAUSED
      git_source:
        git_url: https://github.com/dunglk85/btc_mle_dbr
        git_provider: gitHub
        git_branch: main
      tasks:
        - task_key: monitoring_gate
          notebook_task:
            notebook_path: notebooks/07_monitoring_gate
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              trigger_mode: "scheduled"

        - task_key: model_training
          notebook_task:
            notebook_path: notebooks/03_optuna_training
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
              n_trials: "15"
              timeout_seconds: "900"
          depends_on:
            - task_key: monitoring_gate

        - task_key: champion_challenger
          notebook_task:
            notebook_path: notebooks/04_champion_challenger
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: model_training
