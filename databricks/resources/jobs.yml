bundle:
  name: btc_mle_dbr

variables:
  catalog:
    default: btc_dev

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: btc_dev

  prod:
    mode: production
    variables:
      catalog: btc_prod

resources:
  jobs:
    btc_ingestion_job:
      name: "[${bundle.target}] BTC Ingestion Job"
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      git_source:
        git_url: https://github.com/dunglk85/btc_mle_dbr
        git_provider: gitHub
        git_branch: main
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: data_ingestion
          environment_key: default
          notebook_task:
            notebook_path: notebooks/01_data_ingestion.py
            source: GIT
            base_parameters:
              catalog: ${var.catalog}

    btc_retrain_job:
      name: "[${bundle.target}] BTC Retrain Job"
      schedule:
        quartz_cron_expression: "0 0 */3 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      git_source:
        git_url: https://github.com/dunglk85/btc_mle_dbr
        git_provider: gitHub
        git_branch: main
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: feature_engineering
          environment_key: default
          notebook_task:
            notebook_path: notebooks/02_feature_engineering.py
            source: GIT
            base_parameters:
              catalog: ${var.catalog}

        - task_key: model_training
          environment_key: default
          notebook_task:
            notebook_path: notebooks/03_model_training.py
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: feature_engineering

        - task_key: champion_challenger
          environment_key: default
          notebook_task:
            notebook_path: notebooks/04_champion_challenger.py
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: model_training

        - task_key: prediction
          environment_key: default
          notebook_task:
            notebook_path: notebooks/05_prediction.py
            source: GIT
            base_parameters:
              catalog: ${var.catalog}
          depends_on:
            - task_key: champion_challenger