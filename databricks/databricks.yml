bundle:
  name: btc-mlops

variables:
  catalog:
    description: Unity Catalog name for the selected environment
    default: btc_dev

include:
  - resources/*.yml

targets:
  dev:
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      catalog: btc_dev
  prod:
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      catalog: btc_prd

artifacts:
  default:
    type: whl
    build: uv build --wheel
    path: ..
