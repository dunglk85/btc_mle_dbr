bundle:
  name: btc-mlops

variables:
  catalog:
    description: Unity Catalog name for the selected environment
    default: btc_dev

include:
  - resources/*.yml

sync:
  paths:
    - ../notebooks
    - ../src

targets:
  dev:
    variables:
      catalog: btc_dev
  prod:
    variables:
      catalog: btc_prd
