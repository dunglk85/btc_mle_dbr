bundle:
  name: btc-mlops

variables:
  catalog:
    description: Unity Catalog name for the selected environment
    default: btc_dev
  sql_warehouse_id:
    description: Databricks SQL warehouse ID used by SQL alerts
    default: ""

include:
  - databricks/resources/*.yml

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: btc_dev
  prod:
    mode: production
    variables:
      catalog: btc_prod
