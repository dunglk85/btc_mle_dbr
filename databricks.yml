bundle:
  name: btc-mlops

variables:
  catalog:
    description: Unity Catalog name for the selected environment
    default: btc_simply
  sql_warehouse_id:
    description: Databricks SQL warehouse ID used by SQL alerts
    default: 632f18779c3b51ec
  git_branch:
    description: Git branch used by Databricks Git-backed jobs
    default: simplying
  training_job_id:
    description: Databricks Job ID for the training job (set after first deploy)
    default: ""

include:
  - databricks/resources/*.yml

targets:
  dev:
    mode: development
    variables:
      catalog: btc_simply
      sql_warehouse_id: 632f18779c3b51ec
      git_branch: simplying
  simplying:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/dunglk85@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: btc_simply
      sql_warehouse_id: 632f18779c3b51ec
      git_branch: simplying
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/dunglk85@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: btc_prod
      git_branch: main
