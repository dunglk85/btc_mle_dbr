bundle:
  name: btc-mlops

variables:
  catalog:
    description: Unity Catalog name for the selected environment
    default: btc_dev
  sql_warehouse_id:
    description: Databricks SQL warehouse ID used by SQL alerts
    default: 632f18779c3b51ec

include:
  - databricks/resources/*.yml

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: btc_dev
      sql_warehouse_id: 632f18779c3b51ec
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/dunglk85@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: btc_prod
