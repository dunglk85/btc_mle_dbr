bundle:
  name: btc-mlops

variables:
  catalog:
    description: Unity Catalog name for the selected environment
    default: btc_dev

include:
  - databricks/resources/*.yml

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: btc_dev
  prod:
    mode: production
    variables:
      catalog: btc_prod
